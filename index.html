<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekomendasi Menu Makanan Harian - KNN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div id="vanta-bg"></div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="text-center mb-5">
                <h2 class="fw-bold text-gradient">Sistem Rekomendasi Menu Makanan</h2>
                <p class="text-white-50">Implementasi Algoritma K-Nearest Neighbors & Content-Based Filtering</p>
            </div>
            
            <div class="glass-card p-4 p-md-5">
                <form action="/process" method="POST">
                    
                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label for="berat" class="form-label fw-semibold">Berat Badan (kg)</label>
                            <input type="number" step="any" class="form-control" id="berat" name="berat" required placeholder="Contoh: 65">
                        </div>
                        
                        <div class="col-md-6 mb-4">
                            <label for="tinggi" class="form-label fw-semibold">Tinggi Badan (cm)</label>
                            <input type="number" step="any" class="form-control" id="tinggi" name="tinggi" required placeholder="Contoh: 170">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label for="usia" class="form-label fw-semibold">Usia (Tahun)</label>
                            <input type="number" class="form-control" id="usia" name="usia" required placeholder="Contoh: 22">
                        </div>
                        
                        <div class="col-md-6 mb-4">
                            <label for="gender" class="form-label fw-semibold">Jenis Kelamin</label>
                            <select class="form-select" id="gender" name="gender" required>
                                <option value="" disabled selected style="background: #111;">Pilih jenis kelamin...</option>
                                <option value="pria" style="background: #111;">Pria</option>
                                <option value="wanita" style="background: #111;">Wanita</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="aktivitas" class="form-label fw-semibold">Tingkat Aktivitas Fisik</label>
                        <select class="form-select" id="aktivitas" name="aktivitas" required>
                            <option value="" disabled selected style="background: #111;">Pilih tingkat aktivitas harian...</option>
                            <option value="ringan" style="background: #111;">Ringan (Jarang olahraga / kerja kantoran)</option>
                            <option value="sedang" style="background: #111;">Sedang (Olahraga 3-5 hari/minggu)</option>
                            <option value="berat" style="background: #111;">Berat (Olahraga berat 6-7 hari/minggu)</option>
                        </select>
                    </div>

                    <hr style="border-color: rgba(255,255,255,0.15);" class="my-4">

                    <div class="mb-4 p-3 rounded-3" style="background: rgba(255,255,255,0.05); border-left: 4px solid #00f260;">
                        <label for="preferensi" class="form-label fw-semibold text-gradient">Preferensi Bahan Makanan (Opsional)</label>
                        <input type="text" class="form-control" id="preferensi" name="preferensi" placeholder="Masukkan bahan dasar, misal: Ayam, Ikan, Daging, Sayur">
                        <div class="form-text text-white-50 mt-2" style="font-size: 0.8rem;">Sistem akan memfilter menu berdasarkan bahan di atas sebelum menghitung kedekatan gizi menggunakan KNN.</div>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn fw-bold text-white btn-lg" style="background: linear-gradient(to right, #00f260, #0575E6); border: none; border-radius: 12px;">
                            Hitung & Analisis Gizi
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
<script>
    VANTA.NET({
      el: "#vanta-bg",
      mouseControls: true,
      touchControls: true,
      gyroControls: false,
      minHeight: 200.00,
      minWidth: 200.00,
      scale: 1.00,
      scaleMobile: 1.00,
      color: 0x0575e6,
      backgroundColor: 0x0,
      points: 11.00,
      maxDistance: 22.00,
      spacing: 16.00
    })
</script>
</body>
</html>
